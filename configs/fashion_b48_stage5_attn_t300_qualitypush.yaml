seed: 42

dataset:
  name: fashion_mnist
  root: ./data
  image_size: 28
  channels: 1

centralized:
  rounds: 320
  max_steps_per_round: 100

model:
  architecture: unet
  base_channels: 48
  channel_multipliers: [1, 2, 4, 4, 8]
  encoder_blocks_per_level: [2, 3, 3, 4, 4]
  decoder_blocks_per_level: [4, 4, 3, 2]
  mid_blocks: 4
  downsample_levels: [0, 1, 2]
  lora_rank: 4
  lora_alpha: 4.0
  attention_levels: [2, 3, 4]
  attention_heads: 6
  attention_head_dim: 48
  mid_attention: true

diffusion:
  timesteps: 300
  sample_steps: 300
  sampler: ddpm
  ddim_eta: 0.0
  clip_denoised: true
  x0_loss_weight: 0.1

training:
  batch_size: 128
  lr: 0.00015
  num_workers: 0
  weight_decay: 0.0
  ema_decay: 0.9995
  unfreeze_param_prefixes:
    - "*"

evaluation:
  num_real_samples: 128
  num_fake_samples: 64
  eval_batch_size: 64
  proxy_feature_size: 8

system:
  device: auto
  output_dir: ./outputs/fashion_b48_stage5_attn_t300_qualitypush_run
  save_every_round: false
  save_final_samples: true
