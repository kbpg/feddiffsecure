seed: 42

dataset:
  name: stl10
  root: ./data
  image_size: 96
  channels: 3

centralized:
  rounds: 260
  max_steps_per_round: 96

model:
  architecture: unet
  base_channels: 88
  channel_multipliers: [1, 1, 2, 2, 4, 4, 8, 8]
  encoder_blocks_per_level: [2, 2, 3, 3, 4, 4, 5, 5]
  decoder_blocks_per_level: [5, 4, 4, 3, 3, 2, 2]
  mid_blocks: 4
  downsample_levels: [0, 1, 2, 3, 4]
  lora_rank: 4
  lora_alpha: 4.0
  attention_levels: [4, 5, 6, 7]
  attention_heads: 8
  attention_head_dim: 88
  mid_attention: true

diffusion:
  timesteps: 600
  sample_steps: 600
  sampler: ddpm
  ddim_eta: 0.0
  clip_denoised: true
  x0_loss_weight: 0.1

training:
  batch_size: 2
  lr: 0.00005
  num_workers: 0
  weight_decay: 0.0
  ema_decay: 0.9996
  unfreeze_param_prefixes:
    - "*"

evaluation:
  num_real_samples: 128
  num_fake_samples: 64
  eval_batch_size: 16
  proxy_feature_size: 8
  semantic_eval_every: 20
  evaluator_cache_dir: ./outputs/evaluators

system:
  device: auto
  output_dir: ./outputs/stl10_b88_stage8_attn_t600_deepstack_run
  save_every_round: false
  save_final_samples: true
