site:
  title: 核心思想与实验设计
  subtitle: 围绕“联邦场景下的 LoRA 轻量化训练与安全更新”重写论文主线，并明确参考论文、系统实现与实验设计之间的边界。
  citation_note: 以下页面中的公式、机制说明和问题定义，均采用“参考文献中的经典写法 + 结合本课题实验设置改写”的口径。页面内容服务于论文写作和答辩展示，不应直接表述为本课题原创理论。
  model_image: demo_portal/static/reference_assets/project_model.png
  model_caption: 课题原型的系统示意图。更适合作为工程实现和数据流说明，而不是原创理论结构图。
  overview:
    - 论文主线聚焦“冻结底座，只训练并聚合 UNet-LoRA 更新”的联邦轻量化训练与安全更新。
    - 参考论文提供的是问题定义、方法来源和可引用表达；本课题真正落地的是一条可运行、可审计、可展示的系统链路。
    - 实验设计围绕三件事展开：联邦引入后训练效果如何变化、LoRA 轻量化是否真正降低通信成本、安全更新链路是否能稳定完成完整性审计。

