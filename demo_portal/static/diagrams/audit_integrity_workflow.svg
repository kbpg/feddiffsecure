<svg width="1400" height="780" viewBox="0 0 1400 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="780" rx="40" fill="#F8FBFF"/>
  <rect x="34" y="34" width="1332" height="712" rx="34" fill="white" stroke="#DCE7F5" stroke-width="2"/>

  <text x="82" y="108" fill="#0E2850" font-size="42" font-family="Microsoft YaHei, Segoe UI, sans-serif" font-weight="700">审计完整性工作流</text>
  <text x="82" y="150" fill="#537095" font-size="24" font-family="Microsoft YaHei, Segoe UI, sans-serif">核心问题不是“更新是否绝对保密”，而是“更新在封装与恢复之后有没有被破坏”</text>

  <rect x="82" y="230" width="220" height="180" rx="24" fill="#EEF5FF" stroke="#BFD6FF" stroke-width="2"/>
  <text x="112" y="286" fill="#0E2850" font-size="30" font-family="Microsoft YaHei, Segoe UI, sans-serif" font-weight="700">本地可训练更新</text>
  <text x="112" y="336" fill="#385072" font-size="22" font-family="Microsoft YaHei, Segoe UI, sans-serif">LoRA / 增量参数</text>

  <rect x="354" y="230" width="220" height="180" rx="24" fill="#FFF6EE" stroke="#FFD6B7" stroke-width="2"/>
  <text x="384" y="286" fill="#0E2850" font-size="30" font-family="Microsoft YaHei, Segoe UI, sans-serif" font-weight="700">发送前哈希</text>
  <text x="384" y="336" fill="#385072" font-size="22" font-family="Microsoft YaHei, Segoe UI, sans-serif">记录原始 SHA-256</text>

  <rect x="626" y="230" width="220" height="180" rx="24" fill="#F6F0FF" stroke="#D8C7FF" stroke-width="2"/>
  <text x="656" y="286" fill="#0E2850" font-size="30" font-family="Microsoft YaHei, Segoe UI, sans-serif" font-weight="700">压缩与隐写封装</text>
  <text x="656" y="336" fill="#385072" font-size="22" font-family="Microsoft YaHei, Segoe UI, sans-serif">得到可传输载荷</text>

  <rect x="898" y="230" width="220" height="180" rx="24" fill="#EEFDF6" stroke="#BFE9D1" stroke-width="2"/>
  <text x="928" y="286" fill="#0E2850" font-size="30" font-family="Microsoft YaHei, Segoe UI, sans-serif" font-weight="700">服务端恢复</text>
  <text x="928" y="336" fill="#385072" font-size="22" font-family="Microsoft YaHei, Segoe UI, sans-serif">解包并恢复更新</text>

  <rect x="1170" y="230" width="148" height="180" rx="24" fill="#FFF0F5" stroke="#FFC7DA" stroke-width="2"/>
  <text x="1195" y="286" fill="#0E2850" font-size="28" font-family="Microsoft YaHei, Segoe UI, sans-serif" font-weight="700">重新哈希</text>
  <text x="1195" y="336" fill="#385072" font-size="22" font-family="Microsoft YaHei, Segoe UI, sans-serif">恢复后 SHA-256</text>

  <path d="M302 320H342" stroke="#8DB4FF" stroke-width="10" stroke-linecap="round"/>
  <path d="M574 320H614" stroke="#F0A467" stroke-width="10" stroke-linecap="round"/>
  <path d="M846 320H886" stroke="#A88CFB" stroke-width="10" stroke-linecap="round"/>
  <path d="M1118 320H1158" stroke="#6BC897" stroke-width="10" stroke-linecap="round"/>

  <rect x="178" y="500" width="1046" height="170" rx="28" fill="#F6F8FC" stroke="#D7DEEE" stroke-width="2"/>
  <text x="220" y="560" fill="#0E2850" font-size="34" font-family="Microsoft YaHei, Segoe UI, sans-serif" font-weight="700">完整性判定</text>
  <text x="220" y="604" fill="#385072" font-size="22" font-family="Microsoft YaHei, Segoe UI, sans-serif">
    <tspan x="220" dy="0">若“发送前 SHA-256 == 恢复后 SHA-256”，则说明更新在传输链路中保持无损。</tspan>
    <tspan x="220" dy="34">这证明了端到端传输完整性；但它仍不等价于强攻击者模型下的机密性与形式化安全证明。</tspan>
  </text>
</svg>
