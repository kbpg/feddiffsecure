seed: 42

dataset:
  name: mnist
  root: ./data
  image_size: 28
  channels: 1

federated:
  num_clients: 4
  clients_per_round: 4
  rounds: 45
  dirichlet_alpha: 0.5
  local_epochs: 1
  max_steps_per_epoch: 20

model:
  architecture: unet
  base_channels: 24
  channel_multipliers: [1, 2, 4, 8]
  blocks_per_level: 2
  lora_rank: 8
  lora_alpha: 8.0

diffusion:
  timesteps: 300
  sample_steps: 300
  sampler: ddpm
  ddim_eta: 0.0
  clip_denoised: true

training:
  batch_size: 128
  lr: 0.0002
  num_workers: 2
  weight_decay: 0.0

evaluation:
  num_real_samples: 256
  num_fake_samples: 256
  eval_batch_size: 128
  proxy_feature_size: 8

system:
  device: auto
  output_dir: ./outputs/mnist_xdeeper_unet_rank8_t300_run
  save_every_round: false
  save_final_samples: true

stego:
  enabled: true
  key_prefix: FedDiffSecure
