seed: 42

dataset:
  name: fashion_mnist
  root: ./data
  image_size: 28
  channels: 1

federated:
  num_clients: 4
  clients_per_round: 4
  rounds: 30
  dirichlet_alpha: 0.5
  local_epochs: 1
  max_steps_per_epoch: 20

model:
  base_channels: 8
  lora_rank: 4
  lora_alpha: 4.0

diffusion:
  timesteps: 100
  sample_steps: 50

training:
  batch_size: 128
  lr: 0.0005
  num_workers: 2
  weight_decay: 0.0

evaluation:
  num_real_samples: 256
  num_fake_samples: 256
  eval_batch_size: 128
  proxy_feature_size: 8

system:
  device: auto
  output_dir: ./outputs/stabilization_best_run
  save_every_round: false
  save_final_samples: false

stego:
  enabled: true
  key_prefix: FedDiffSecure
