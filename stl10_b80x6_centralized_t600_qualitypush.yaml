seed: 42

dataset:
  name: stl10
  root: ./data
  image_size: 96
  channels: 3

centralized:
  rounds: 260
  max_steps_per_round: 96

model:
  architecture: unet
  base_channels: 80
  channel_multipliers: [1, 2, 4, 8, 8, 8]
  blocks_per_level: 3
  lora_rank: 4
  lora_alpha: 4.0

diffusion:
  timesteps: 600
  sample_steps: 600
  sampler: ddpm
  ddim_eta: 0.0
  clip_denoised: true
  x0_loss_weight: 0.1

training:
  batch_size: 4
  lr: 0.00008
  num_workers: 0
  weight_decay: 0.0
  ema_decay: 0.9995
  unfreeze_param_prefixes:
    - "*"

evaluation:
  num_real_samples: 128
  num_fake_samples: 64
  eval_batch_size: 32
  proxy_feature_size: 8
  semantic_eval_every: 20
  evaluator_cache_dir: ./outputs/evaluators

system:
  device: auto
  output_dir: ./outputs/stl10_b80x6_centralized_t600_qualitypush_run
  save_every_round: false
  save_final_samples: true
